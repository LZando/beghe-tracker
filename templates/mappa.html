{% extends "base.html" %}
{% block title %}Mappa — Beghe Tracker{% endblock %}

{% block content %}
<div class="map-head">
    <h2>Mappa beghe → fornitori</h2>
    <div class="map-controls">
        <span class="legend"><i class="dot scaduta"></i>Scaduta</span>
        <span class="legend"><i class="dot in-scadenza"></i>In scadenza</span>
        <span class="legend"><i class="dot aperta"></i>Aperta</span>
        <span class="legend"><i class="dot risolta"></i>Risolta</span>
        <label class="map-toggle"><input type="checkbox" id="toggle-risolte"> Mostra risolte</label>
        <select id="ordina" class="map-select" title="Ordina le beghe nella colonna">
            <option value="scadenza">Ordina: scadenza</option>
            <option value="priorita">Ordina: priorità</option>
            <option value="titolo">Ordina: titolo</option>
        </select>
        <button class="btn small" type="button" onclick="MAP.zoom(1.2)">+</button>
        <button class="btn small" type="button" onclick="MAP.zoom(0.83)">−</button>
        <button class="btn small ghost" type="button" onclick="MAP.fit()">Adatta</button>
    </div>
</div>

<div id="map-canvas" class="map-canvas">
    <svg id="map-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                    markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"></path>
            </marker>
        </defs>
        <g id="map-viewport"></g>
    </svg>
    <div id="map-tip" class="map-tip" hidden></div>
    <p id="map-empty" class="empty" hidden>Nessun fornitore da mostrare. Aggiungine uno dalla Dashboard.</p>
</div>

<script>
    const GRAFO = {{ grafo|tojson }};
</script>
<script src="{{ url_for('static', filename='mappa.js') }}"></script>
{% endblock %}
