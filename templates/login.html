{% extends "base.html" %}
{% block title %}Accedi — Beghe Tracker{% endblock %}

{% block content %}
<div class="auth-wrap">
    <section class="card auth-card">
        <h1 class="auth-title">Accedi</h1>
        <p class="muted">Entra con la tua email e password.</p>
        <form method="post" action="{{ url_for('login') }}" class="form">
            <input type="hidden" name="next" value="{{ next or '' }}">
            <label>Email<input name="email" type="email" value="{{ email or '' }}" required autofocus></label>
            <label>Password<input name="password" type="password" required></label>
            <button class="btn primary" type="submit">Accedi</button>
        </form>
        <p class="auth-alt">Non hai un account? <a href="{{ url_for('register') }}">Registrati</a></p>
    </section>
</div>
{% endblock %}
