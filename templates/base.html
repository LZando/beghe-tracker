<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Beghe Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">Beghe Tracker</a>
    <nav>
        {% if user %}
        <a href="{{ url_for('index') }}">Dashboard</a>
        <a href="{{ url_for('mappa') }}">Mappa</a>
        <a href="{{ url_for('export_csv') }}">Esporta CSV</a>
        <span class="nav-sep"></span>
        <a href="{{ url_for('profilo') }}" class="nav-user" title="Profilo">{{ nome_utente(user) }}</a>
        <form method="post" action="{{ url_for('logout') }}" class="nav-logout">
            <button type="submit" class="linklike">Esci</button>
        </form>
        {% endif %}
    </nav>
</header>

<main class="wrap">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
            <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</main>

<script>
    // Apertura/chiusura modali native <dialog> tramite data-attribute.
    document.addEventListener('click', (e) => {
        const opener = e.target.closest('[data-open-modal]');
        if (opener) {
            document.getElementById(opener.dataset.openModal)?.showModal();
            return;
        }
        if (e.target.closest('[data-close-modal]')) {
            e.target.closest('dialog')?.close();
            return;
        }
        // click sullo sfondo (backdrop) chiude la modale
        if (e.target.tagName === 'DIALOG') e.target.close();
    });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
